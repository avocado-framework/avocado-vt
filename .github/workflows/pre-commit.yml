name: pre-commit

on:
  pull_request:
  push:
    branches: [master]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    env:
      SKIP: no-commit-to-branch
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
    - uses: actions/setup-python@v7
    - uses: pre-commit/action@v3.0.1
